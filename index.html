<!-- HEADER -->
<header>

    </div>
    <span class="budget-num" id="budget-num">0 / 6</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-danger" id="clear-btn" onclick="clearAll()" disabled>Clear</button>
    <button class="btn btn-export" id="export-btn" onclick="toggleExport()" disabled>Export ↗</button>
  </div>
</header>

<!-- SELECTED CHIPS -->
<div class="selected-bar" id="selected-bar">
  <span class="empty-msg">No characters selected — choose characters until you reach tier 6.</span>
</div>

<!-- EXPORT PANEL -->
<div class="export-panel" id="export-panel" style="display:none">
  <div class="export-panel-inner">
    <div class="export-header">
      <span class="export-title">Your selection</span>
      <div class="export-actions">
        <button class="btn" id="copy-btn" onclick="copyText()">Copy to clipboard</button>
        <button class="btn" onclick="downloadText()">Download .txt</button>
        <button class="btn" onclick="toggleExport()">Close</button>
      </div>
    </div>
    <textarea class="export-textarea" id="export-text" readonly></textarea>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input class="search-input" id="search" type="text" placeholder="Search name, set, or effect…" oninput="render()" />
  </div>
  <button class="filter-btn active" id="f-all" onclick="setFilter('all')">All</button>
  <button class="filter-btn" id="f-hero" onclick="setFilter('hero')">Heroes</button>
  <button class="filter-btn" id="f-villain" onclick="setFilter('villain')">Villains</button>
</div>

<!-- MAIN -->
<main id="main-content"></main>

<footer>

  {tier:6,name:"Lex Luthor (Cost 12)",type:"Super-Villain",set:"Rivals 5",effect:"You pay 1 less to buy Villains and Equipment from the Line-Up. Each time you gain a Villain or Equipment from the Line-Up, you may put it on the bottom of your deck."},
  {tier:6,name:"Golden Glider",type:"Super-Villain",set:"Crossover 5",effect:"Each time you play a card you don't own, draw a card. Teamwork: That foe gains 1 VP."},
  {tier:6,name:"Mister Terrific",type:"Super-Hero",set:"DNM",effect:"Once during each of your turns: You may gain a Weakness and put it into your hand. If you do, draw 2 cards."},
  {tier:6,name:"The Joker (Cost 15)",type:"Super-Villain",set:"Confrontations",effect:"Confrontation: +1 Power for each Villain and for each Super Power you play."},
  {tier:6,name:"Ocean Master (Cost 12)",type:"Super-Villain",set:"Confrontations",effect:"Once during each of your turns, you may put a card with cost 3 or less from your discard pile into your hand."},
];

let selected = [];
let typeFilter = 'all';
let exportOpen = false;

function totalUsed() { return selected.reduce((s,c)=>s+c.tier,0); }
function canAdd(c) { return totalUsed()+c.tier<=6; }
function isSelected(c) { return selected.some(s=>s.name===c.name&&s.set===c.set&&s.tier===c.tier); }

function toggleCard(card) {
  const idx = selected.findIndex(s=>s.name===card.name&&s.set===card.set&&s.tier===card.tier);
  if (idx>=0) selected.splice(idx,1);
  else if (canAdd(card)) selected.push(card);
  render();
}

function clearAll() { selected=[]; exportOpen=false; document.getElementById('export-panel').style.display='none'; render(); }
function setFilter(f) { typeFilter=f; render(); }

function buildExportText() {
  const line = (n) => '='.repeat(n);
  const dash = (n) => '-'.repeat(n);
  const rows = [];
  rows.push('DC DECKBUILDING GAME — MAIN CHARACTER SELECTION');
  rows.push(line(50));
  rows.push('');
  rows.push(`Budget used : ${totalUsed()} / 6`);
  rows.push(`Characters  : ${selected.length}`);
  rows.push('');
  rows.push(dash(50));
  selected.forEach((c,i) => {
    rows.push('');
    rows.push(`${i+1}. ${c.name}  [Tier ${c.tier}]`);
    rows.push(`   Type   : ${c.type}`);
    rows.push(`   Set    : ${c.set}`);
    rows.push(`   Effect : ${c.effect}`);
  });
  rows.push('');
  rows.push(dash(50));
  rows.push(`Generated: ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}`);
  return rows.join('\n');
}

function toggleExport() {
  if (!selected.length) return;
  exportOpen = !exportOpen;
  const panel = document.getElementById('export-panel');
  if (exportOpen) {
    document.getElementById('export-text').value = buildExportText();
    panel.style.display = 'block';
    panel.scrollIntoView({behavior:'smooth', block:'nearest'});
  } else {
    panel.style.display = 'none';
  }
  resetCopyBtn();
}

function resetCopyBtn() {
  const b = document.getElementById('copy-btn');
  if (b) { b.textContent='Copy to clipboard'; b.classList.remove('btn-copy-success'); }
}

function copyText() {
  navigator.clipboard.writeText(document.getElementById('export-text').value).then(()=>{
    const b = document.getElementById('copy-btn');
    b.textContent='Copied!'; b.classList.add('btn-copy-success');
    setTimeout(resetCopyBtn, 2000);
  });
}

function downloadText() {
  const text = document.getElementById('export-text').value;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text],{type:'text/plain'}));
  a.download = 'dc_deckbuilding_selection.txt';
  a.click();
}

function render() {
  const used = totalUsed();
  const pct = Math.round((used/6)*100);
  const fill = document.getElementById('budget-fill');
  const num = document.getElementById('budget-num');
  const fillColor = used===6?'#c41a1a':used>=4?'#a06010':'#1e6b4a';
  fill.style.width = pct+'%';
  fill.style.background = fillColor;
  num.textContent = `${used} / 6`;
  num.style.color = used===6?'#f54040':'#e8edf5';

  document.getElementById('clear-btn').disabled = selected.length===0;
  document.getElementById('export-btn').disabled = selected.length===0;

  // chips
  const bar = document.getElementById('selected-bar');
  if (!selected.length) {
    bar.innerHTML = '<span class="empty-msg">No characters selected — choose characters until you reach tier 6.</span>';
  } else {
    bar.innerHTML = selected.map((c,i)=>{
      const col = TIER_COLORS[c.tier];
      return `<div class="chip" style="background:${col.bg};color:${col.color};border-color:${col.border}" onclick="toggleCard(selected_ref[${i}])">
        ${c.name} <span style="font-size:10px;opacity:0.6">(T${c.tier})</span><span class="chip-remove">✕</span>
      </div>`;
    }).join('');
    // expose a ref array for onclick
    window.selected_ref = selected;
  }

  // filters
  ['f-all','f-hero','f-villain'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(typeFilter==='hero'?'f-hero':typeFilter==='villain'?'f-villain':'f-all').classList.add('active');

  // update export live if open
  if (exportOpen && selected.length) document.getElementById('export-text').value = buildExportText();

  const q = document.getElementById('search').value.toLowerCase();
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  [1,2,3,4,5,6].forEach(tier=>{
    let cards = DATA.filter(c=>c.tier===tier);
    if (typeFilter==='hero') cards=cards.filter(c=>c.type==='Super-Hero');
    if (typeFilter==='villain') cards=cards.filter(c=>c.type==='Super-Villain');
    if (q) cards=cards.filter(c=>c.name.toLowerCase().includes(q)||c.set.toLowerCase().includes(q)||c.effect.toLowerCase().includes(q));
    if (!cards.length) return;

    const col = TIER_COLORS[tier];
    const sec = document.createElement('div');
    sec.className='tier-section';

    const hdg = document.createElement('div');
    hdg.className='tier-heading';
    hdg.innerHTML=`
      <span class="tier-pill" style="color:${col.color};border-color:${col.border};background:${col.bg}">Tier ${tier}</span>
      <div class="tier-rule"></div>
      <span class="tier-count">${cards.length} card${cards.length!==1?'s':''}</span>`;
    sec.appendChild(hdg);

    const grid = document.createElement('div');
    grid.className='card-grid';

    cards.forEach(card=>{
      const sel = isSelected(card);
      const dis = !sel && !canAdd(card);
      const typeStyle = card.type==='Super-Hero'
        ? 'background:#0b2340;color:#5ba3f5'
        : 'background:#3d0808;color:#f07070';

      const div = document.createElement('div');
      div.className='mc-card'+(sel?' selected':'')+(dis?' disabled':'');
      if (sel) {
        div.style.setProperty('--selected-color', col.color);
        div.style.setProperty('--selected-bg', col.bg);
      }
      div.innerHTML=`
        <div class="selected-check">✓</div>
        <div class="card-top">
          <div class="mc-name">${card.name}</div>
          <span class="mc-type-badge" style="${typeStyle}">${card.type==='Super-Hero'?'Hero':'Villain'}</span>
        </div>
        <div class="mc-set">${card.set}</div>
        <div class="mc-effect">${card.effect}</div>`;
      if (!dis) div.onclick=()=>toggleCard(card);
      grid.appendChild(div);
    });

    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

render();
</script>
</body>
